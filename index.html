<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* ===== SPLASH ===== */
.splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:#0f2533;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.splash svg{
    width:130px;
    height:130px;
}

.metaSplash{
    position:absolute;
    bottom:50px;
    text-align:center;
    color:#aaa;
    font-size:16px;
}

.metaSplash strong{
    font-size:18px;
    background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ===== LOGIN ===== */
body{
    background:#0f2533;
    height:100vh;
    color:white;
}

.container{
    display:none;
    width:100%;
    max-width:420px;
    margin:auto;
    padding:20px;
    flex-direction:column;
    align-items:center;
    height:100vh;
}

.logo{
    margin-top:80px;
    margin-bottom:60px;
    display:flex;
    justify-content:center;
}

.logo svg{
    width:95px;
    height:95px;
}

.input-box{
    width:100%;
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    height:65px;
    border:2px solid #3b5266;
    border-radius:20px;
    background:transparent;
    color:white;
    font-size:16px;
    padding:0 20px;
    outline:none;
}

.input-box input::placeholder{
    color:#a4adb6;
}

.login-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:30px;
    background:#1877f2;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.forgot{
    margin-top:20px;
    color:white;
    text-decoration:none;
    font-size:16px;
}

.bottom{
    margin-top:auto;
    width:100%;
    text-align:center;
    padding-bottom:30px;
}

.create{
    width:100%;
    height:55px;
    border:2px solid #2d8cff;
    border-radius:30px;
    background:transparent;
    color:#4fa0ff;
    font-size:16px;
}

.meta{
    margin-top:25px;
    font-size:18px;
    color:#d6d6d6;
}
</style>

</head>

<body>

<!-- SPLASH -->
<div class="splash" id="splash">

<svg viewBox="0 0 24 24" fill="none">
<defs>
<linearGradient id="ig" x1="0" y1="1" x2="1" y2="0">
<stop offset="0%" stop-color="#feda75"/>
<stop offset="20%" stop-color="#fa7e1e"/>
<stop offset="45%" stop-color="#d62976"/>
<stop offset="70%" stop-color="#962fbf"/>
<stop offset="100%" stop-color="#4f5bd5"/>
</linearGradient>
</defs>

<rect x="3" y="3" width="18" height="18" rx="5"
stroke="url(#ig)" stroke-width="2.2"/>

<circle cx="12" cy="12" r="4.2"
stroke="url(#ig)" stroke-width="2.2"/>

<circle cx="17.5" cy="6.5" r="1.3" fill="url(#ig)"/>
</svg>

<div class="metaSplash">
<span>from</span>
<strong>Meta</strong>
</div>

</div>

<!-- LOGIN -->
<div class="container" id="login">

<div class="logo">

<svg viewBox="0 0 24 24" fill="none">
<defs>
<linearGradient id="ig2" x1="0" y1="1" x2="1" y2="0">
<stop offset="0%" stop-color="#feda75"/>
<stop offset="20%" stop-color="#fa7e1e"/>
<stop offset="45%" stop-color="#d62976"/>
<stop offset="70%" stop-color="#962fbf"/>
<stop offset="100%" stop-color="#4f5bd5"/>
</linearGradient>
</defs>

<rect x="3" y="3" width="18" height="18" rx="5"
stroke="url(#ig2)" stroke-width="2.2"/>

<circle cx="12" cy="12" r="4.2"
stroke="url(#ig2)" stroke-width="2.2"/>

<circle cx="17.5" cy="6.5" r="1.3" fill="url(#ig2)"/>
</svg>

</div>

<div class="input-box">
<input type="text" placeholder="Nome utente, e-mail o numero di cellulare">
</div>

<div class="input-box">
<input type="password" placeholder="Password">
</div>

<button class="login-btn">Accedi</button>

<a href="#" class="forgot">Password dimenticata?</a>

<div class="bottom">
<button class="create">Crea nuovo account</button>
<div class="meta">∞ Meta</div>
</div>

</div>

<script>
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("login").style.display = "flex";
}, 3000);
</script>

</body>
</html>
